<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Tools Dashboard</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --muted: #8b949e;
            --accent: #f7931a;
            --blue: #58a6ff;
            --white: #fff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            padding: 40px 20px;
        }

        .tools-navigation {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }

        .tools-navigation h2 {
            color: var(--white);
            margin: 0 0 8px 0;
            font-size: 1.8rem;
            letter-spacing: -0.03em;
        }

        .tools-navigation p {
            color: var(--muted);
            margin: 0 0 24px 0;
            font-size: 0.95rem;
        }

        .tools-navigation ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tools-navigation li {
            margin: 0;
        }

        .tools-navigation a {
            display: block;
            color: var(--blue);
            text-decoration: none;
            font-weight: 600;
            padding: 14px 18px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .tools-navigation a:hover {
            color: var(--white);
            background: rgba(247, 147, 26, 0.1);
            border-color: var(--accent);
            transform: translateX(4px);
        }
    </style>
</head>
<body>

    <nav class="tools-navigation">
        <h2>Crypto Tools Dashboard</h2>

            <li><a href="bitcoin-security-engineer-12-month-guide.html">🔒 Bitcoin Security Engineer Guide</a></li>
            <li><a href="loan_payoff_calculator_directors_loan (3).html">💼 Directors Loan Payoff Calculator</a></li>
        </ul>
    </nav>

</body>
</html>
